# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "IBM Bob (Claude-based coding assistant)"

ai_usage_summary: |
  IBM Bob (a Claude-based AI coding assistant) was used throughout the project
  for architecture design, code review, and implementation. The assistant helped
  structure the ten-module pipeline, review scoring weights, and debug edge cases.
  No candidate data was fed to any external LLM or API at any point.
  All scoring logic, keyword sets, and ranking decisions were reviewed and
  validated by the human developer.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Pure rule-based + semantic hybrid ranker. Ten-stage pipeline:

  1. JD Parser — structured hiring intent from JD prose (must-have skills,
     preferred skills, experience bands, salary, locations, disqualifiers).

  2. Semantic Encoder — all-MiniLM-L6-v2 embeddings for all 100K candidate
     narratives, stored offline. Three JD probe documents queried at rank time
     via matrix multiply (< 1s for 100K).

  3. Feature Extractor — 65+ numeric features: retrieval/NLP/eval career
     evidence, python quality signal, preferred skill corroboration, production
     deployment evidence, pre-LLM ML flag, consulting/research fractions, etc.
     Career descriptions are the primary signal; skills require corroboration.

  4. Anti-Trap Detector — six integrity checks: timeline impossibility, skill
     impossibility, keyword stuffing, behavioral contradictions, title inflation,
     corroboration absence. Batch behavioral twin detection.

  5. Composite Scorer — 10-stage weighted formula: technical fit (42%),
     career quality (25%), location (8%), education (6%), bonuses (5%),
     penalties, trust multiplier, behavioral multiplier.

  6. Reason Generator — grounded 1-2 sentence reasoning per candidate;
     every claim traces to a real profile field.

  Runtime: < 1 minute for 100K candidates on CPU.

